# ─────────────────────────────────────
# Render Deployment Configuration
# ─────────────────────────────────────
# This file tells Render how to build and run your backend.
# Commit this to your hackmatch-backend repo root.

services:
  - type: web
    name: hackmatch-backend
    env: python
    region: oregon         # or: frankfurt, singapore, ohio
    plan: free             # upgrade to starter ($7/mo) for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    # Environment variables — set values in Render dashboard,
    # not here. "sync: false" means you supply the value manually.
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_NAME
        value: HackMatch
      - key: DEBUG
        value: False
